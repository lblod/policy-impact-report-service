steps:
  build-feature:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      platforms: linux/amd64,linux/arm64
      repo: ${CI_REPO}
      tags: 'feature-${CI_COMMIT_BRANCH##feature/}'
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
when:
  - event: push
    branch: [feature/*]
